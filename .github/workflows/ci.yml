name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ssot-lint:
    name: SSOT integrity check
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run SSOT lint
        run: bash tools/ssot_check.sh 2>&1 | tee "$RUNNER_TEMP/ssot-lint.log"

      - name: Upload SSOT lint log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ssot-lint-log
          path: ${{ runner.temp }}/ssot-lint.log

  swiftpm-tests:
    name: SwiftPM tests
    runs-on: macos-latest
    needs: ssot-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Guard against ghost test directories
        run: |
          # Fail if duplicate test locations exist
          if [ -d "Tests/DoseTapTests" ]; then
            echo "❌ FAIL: Tests/DoseTapTests should not exist (duplicate of ios/DoseTapTests)"
            exit 1
          fi
          # Check for duplicate SessionRepositoryTests files
          COUNT=$(find . -name "SessionRepositoryTests.swift" -type f | wc -l | tr -d ' ')
          if [ "$COUNT" -gt 1 ]; then
            echo "❌ FAIL: Found $COUNT copies of SessionRepositoryTests.swift - should only have 1"
            find . -name "SessionRepositoryTests.swift" -type f
            exit 1
          fi
          echo "✅ No ghost test directories found"

      - name: Guard against committed app secrets
        run: |
          set -euo pipefail

          if git ls-files --error-unmatch ios/DoseTap/Secrets.swift >/dev/null 2>&1; then
            echo "❌ FAIL: ios/DoseTap/Secrets.swift must never be tracked."
            exit 1
          fi

          MATCHES="$(grep -RInE --exclude='Secrets.template.swift' 'whoopClient(ID|Secret)[[:space:]]*=[[:space:]]*\"' ios/DoseTap ios/Core || true)"
          if [ -n "$MATCHES" ]; then
            BAD="$(printf "%s\n" "$MATCHES" | grep -Ev 'YOUR_WHOOP_CLIENT_(ID|SECRET)|\"\"' || true)"
            if [ -n "$BAD" ]; then
              echo "❌ FAIL: Potential hardcoded WHOOP credentials found:"
              printf "%s\n" "$BAD"
              exit 1
            fi
          fi

          echo "✅ No tracked hardcoded app secrets detected"

      - name: Xcode version
        run: xcodebuild -version

      - name: SwiftPM tests (default timezone)
        run: |
          set -euo pipefail
          swift --version
          swift test --verbose 2>&1 | tee "$RUNNER_TEMP/swift-test-default.log"

      - name: SwiftPM tests (TZ=UTC)
        run: |
          set -euo pipefail
          echo "Running tests in UTC timezone..."
          TZ=UTC swift test 2>&1 | tee "$RUNNER_TEMP/swift-test-utc.log"
          echo "✅ UTC timezone tests passed"

      - name: SwiftPM tests (TZ=America/New_York)
        run: |
          set -euo pipefail
          echo "Running tests in America/New_York timezone..."
          TZ=America/New_York swift test 2>&1 | tee "$RUNNER_TEMP/swift-test-eastern.log"
          echo "✅ America/New_York timezone tests passed"

      - name: Verify critical test suites executed
        run: |
          set -euo pipefail
          LOG="$RUNNER_TEMP/swift-test-default.log"
          CRITICAL_SUITES=(
            "DoseWindowStateTests"
            "DoseWindowEdgeTests"
            "TimeCorrectnessTests"
            "OfflineQueueTests"
            "APIErrorsTests"
          )
          echo "Verifying critical SwiftPM test suites executed..."
          for SUITE in "${CRITICAL_SUITES[@]}"; do
            if grep -Eq "Test [Ss]uite '$SUITE'" "$LOG"; then
              echo "✅ $SUITE executed"
            else
              echo "⚠️ Could not verify $SUITE (may use different log format)"
            fi
          done
          # Check overall test count
          if grep -q "Executed.*tests.*with 0 failures" "$LOG"; then
            echo "✅ All SwiftPM tests passed"
          else
            echo "❌ SwiftPM tests may have failed"
            exit 1
          fi

  release-pin-script-tests:
    name: Release pin script regression checks
    runs-on: macos-latest
    needs: ssot-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release pin script pass/fail behavior
        run: |
          set -euo pipefail
          SCRIPT="tools/validate_release_pins.sh"
          chmod +x "$SCRIPT"

          VALID_PINS="sha256/AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=,sha256/BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB="

          expect_fail() {
            local desc="$1"
            shift
            if "$@"; then
              echo "❌ Expected failure but command succeeded: $desc"
              exit 1
            fi
            echo "✅ Expected failure observed: $desc"
          }

          echo "🔎 Non-release build should skip validation"
          CONFIGURATION=Debug bash "$SCRIPT"

          echo "🔎 Release build with valid pins should pass"
          CONFIGURATION=Release DOSETAP_CERT_PINS="$VALID_PINS" bash "$SCRIPT"

          echo "🔎 Release build should fail for missing pins"
          expect_fail "missing pins" env CONFIGURATION=Release DOSETAP_CERT_PINS="" bash "$SCRIPT"

          echo "🔎 Release build should fail for placeholders"
          expect_fail "placeholder pins" env CONFIGURATION=Release DOSETAP_CERT_PINS="sha256/REPLACE_ME==" bash "$SCRIPT"

          echo "🔎 Release build should fail for malformed format"
          expect_fail "malformed pin format" env CONFIGURATION=Release DOSETAP_CERT_PINS="sha256/not_base64,sha256/BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB=" bash "$SCRIPT"

          echo "🔎 Release build should fail when only one unique pin exists"
          expect_fail "single unique pin" env CONFIGURATION=Release DOSETAP_CERT_PINS="sha256/AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=,sha256/AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=" bash "$SCRIPT"

  xcode-tests:
    name: Xcode simulator tests
    runs-on: macos-latest
    needs: ssot-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Xcode version
        run: xcodebuild -version

      - name: List schemes (debug)
        run: |
          set -euo pipefail
          xcodebuild -list -project ios/DoseTap.xcodeproj

      - name: Run app tests (DoseTap scheme)
        run: |
          set -euo pipefail

          AVAILABLE_IPHONES="$(
            xcrun simctl list devices available \
              | sed -n 's/^[[:space:]]*\\(iPhone[^()]*\\) (\\([0-9A-F-]*\\)) (.*$/\\1|\\2/p'
          )"

          if [[ -z "$AVAILABLE_IPHONES" ]]; then
            echo "❌ No available iPhone simulators found on runner."
            xcrun simctl list devices
            exit 1
          fi

          SIMULATOR_NAME=""
          SIMULATOR_UDID=""
          PREFERRED_NAMES=("iPhone 16 Pro" "iPhone 16" "iPhone 15 Pro" "iPhone 15" "iPhone 14 Pro" "iPhone 14")

          for candidate in "${PREFERRED_NAMES[@]}"; do
            candidate_udid="$(printf "%s\n" "$AVAILABLE_IPHONES" | awk -F'|' -v target="$candidate" '$1 == target { print $2; exit }')"
            if [[ -n "$candidate_udid" ]]; then
              SIMULATOR_NAME="$candidate"
              SIMULATOR_UDID="$candidate_udid"
              break
            fi
          done

          if [[ -z "$SIMULATOR_UDID" ]]; then
            first_entry="$(printf "%s\n" "$AVAILABLE_IPHONES" | head -n1)"
            SIMULATOR_NAME="${first_entry%%|*}"
            SIMULATOR_UDID="${first_entry##*|}"
          fi

          echo "Using simulator: $SIMULATOR_NAME ($SIMULATOR_UDID)"
          DESTINATION="platform=iOS Simulator,id=$SIMULATOR_UDID"
          DERIVED_DATA="$RUNNER_TEMP/DerivedData"
          FINAL_LOG="$RUNNER_TEMP/xcodebuild-test.log"

          # Reduce simulator boot/install flakiness on GitHub hosted runners.
          xcrun simctl shutdown all || true
          xcrun simctl boot "$SIMULATOR_UDID" || true
          xcrun simctl bootstatus "$SIMULATOR_UDID" -b || true

          run_tests() {
            local attempt="$1"
            local attempt_log="$RUNNER_TEMP/xcodebuild-test-attempt-${attempt}.log"
            echo "Running xcodebuild test (attempt $attempt)..."

            set +e
            xcodebuild test \
              -project ios/DoseTap.xcodeproj \
              -scheme DoseTap \
              -destination "$DESTINATION" \
              -derivedDataPath "$DERIVED_DATA" \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGN_IDENTITY="" \
              DEVELOPMENT_TEAM="" \
              | tee "$attempt_log"
            local status=${PIPESTATUS[0]}
            set -e

            cp "$attempt_log" "$FINAL_LOG"
            return "$status"
          }

          if ! run_tests 1; then
            if grep -Eq 'Invalid device state|Failed to install or launch the test runner|Mach error -308|server died|Early unexpected exit|test runner crashed before establishing connection|operation never finished bootstrapping' "$FINAL_LOG"; then
              echo "Transient simulator failure detected; rebooting simulator and retrying once."
              xcrun simctl shutdown all || true
              xcrun simctl boot "$SIMULATOR_UDID" || true
              xcrun simctl bootstatus "$SIMULATOR_UDID" -b || true
              run_tests 2
            else
              echo "xcodebuild failed with non-transient error."
              exit 1
            fi
          fi

      - name: Verify required test suites executed
        run: |
          set -euo pipefail
          LOG="$RUNNER_TEMP/xcodebuild-test.log"
          REQUIRED_SUITES=(
            "SessionRepositoryTests"
            "DataIntegrityTests"
            "ExportIntegrityTests"
            "HealthKitProviderTests"
            "URLRouterTests"
            "UISmokeTests"
            "UIStateTests"
            "E2EIntegrationTests"
            "NavigationFlowTests"
          )
          echo "Verifying required test suites executed..."
          MISSING=0
          for SUITE in "${REQUIRED_SUITES[@]}"; do
            if grep -Eq "Test [Ss]uite '$SUITE'" "$LOG"; then
              echo "✅ $SUITE executed"
            else
              echo "❌ MISSING: $SUITE did not execute"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "❌ $MISSING required test suite(s) missing from execution"
            exit 1
          fi
          echo "✅ All required test suites verified"

      - name: Upload xcodebuild log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-test-log
          path: ${{ runner.temp }}/xcodebuild-test.log

  release-pinning-check:
    name: Release pinning validation
    runs-on: macos-latest
    needs: [swiftpm-tests, xcode-tests, release-pin-script-tests]
    if: startsWith(github.ref, 'refs/tags/')
    env:
      CONFIGURATION: Release
      DOSETAP_CERT_PINS: ${{ secrets.DOSETAP_CERT_PINS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release certificate pins
        run: bash tools/validate_release_pins.sh

      - name: Build Release (non-debug) with pinning env
        run: |
          set -euo pipefail
          xcodebuild build \
            -project ios/DoseTap.xcodeproj \
            -scheme DoseTap \
            -configuration Release \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""
