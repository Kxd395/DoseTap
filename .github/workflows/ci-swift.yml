name: Swift CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Show Swift Version
        run: swift --version
      
      - name: Build
        run: |
          set -euo pipefail
          env -u SDKROOT -u MACOSX_DEPLOYMENT_TARGET -u IPHONEOS_DEPLOYMENT_TARGET \
              -u WATCHOS_DEPLOYMENT_TARGET -u TVOS_DEPLOYMENT_TARGET \
              swift build -v
      
      - name: Run Tests
        run: |
          set -euo pipefail
          env -u SDKROOT -u MACOSX_DEPLOYMENT_TARGET -u IPHONEOS_DEPLOYMENT_TARGET \
              -u WATCHOS_DEPLOYMENT_TARGET -u TVOS_DEPLOYMENT_TARGET \
              swift test --parallel -v 2>&1 | tee "$RUNNER_TEMP/swiftpm-ci-swift.log"
      
      - name: Test Summary
        if: always()
        run: |
          echo "### Test Results" >> $GITHUB_STEP_SUMMARY
          LOG="$RUNNER_TEMP/swiftpm-ci-swift.log"
          if [ -f "$LOG" ]; then
            grep -E "Executed|passed|failed" "$LOG" | tail -5 >> $GITHUB_STEP_SUMMARY
          else
            echo "No test log found — tests may have failed to start." >> $GITHUB_STEP_SUMMARY
          fi

  storage-enforcement:
    name: Storage Enforcement Guard
    runs-on: macos-14
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Check Views don't touch EventStorage.shared
        run: |
          set -euo pipefail
          echo "🔍 Checking for EventStorage.shared violations in Views..."
          # Storage/ directory is allowed (it IS the storage layer). Only views/helpers are violations.
          VIOLATIONS=$(grep -rn "EventStorage\.shared" ios/DoseTap --include="*.swift" | grep -v "Storage/" || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "❌ FAIL: Views/helpers are directly accessing EventStorage.shared"
            echo "All storage access must go through SessionRepository."
            echo ""
            echo "Violations found:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "✅ No EventStorage.shared violations in production code"
      
      - name: Check SQLiteStorage is not used in production code
        run: |
          set -euo pipefail
          echo "🔍 Checking for SQLiteStorage usage in production code..."
          # Exclude: SQLiteStorage.swift itself, test files (tests may reference for setup)
          VIOLATIONS=$(grep -rn "SQLiteStorage\.shared\|: SQLiteStorage\|= SQLiteStorage" ios/DoseTap --include="*.swift" | grep -v "SQLiteStorage.swift" || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "❌ FAIL: SQLiteStorage is being used in production code"
            echo "SQLiteStorage is banned (#if false wrapper). Use SessionRepository.shared instead."
            echo ""
            echo "Violations found:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "✅ No SQLiteStorage violations in production code"
      
      - name: Guard Summary
        if: always()
        run: |
          echo "### Storage Enforcement" >> $GITHUB_STEP_SUMMARY
          echo "- EventStorage.shared: Views must use SessionRepository" >> $GITHUB_STEP_SUMMARY
          echo "- SQLiteStorage: Banned (#if false wrapper)" >> $GITHUB_STEP_SUMMARY

      - name: Docs consistency check (stale refs)
        run: |
          echo "🔍 Checking for stale references in active docs..."
          # These patterns should NOT appear in active docs
          # Scan: all markdown files in repo
          # Exclude: archive/, legacy/, and intentional changelog/history headers
          # Allowed exceptions:
          #   - "Before | After" tables (showing improvement from 268 to 275)
          #   - "Recent Updates (v2.10.0)" or "New in v2.10.0" changelog headers  
          #   - "Completed (v2.10.0)" backlog/history headers
          STALE=$(find . -name "*.md" -type f ! -path "*/archive/*" ! -path "*/legacy/*" -exec grep -Hn "\b268\b\|v2\.10\.0\|v2\.11\.0\|dosetap\.db\|@available.*unavailable" {} \; 2>/dev/null | grep -v "Before.*After\|| 268 | 275\|Recent Updates.*v2\.10\|New in v2\.10\|Completed.*v2\.10\|Completed.*v2\.11" || true)
          if [ -n "$STALE" ]; then
            echo "❌ FAIL: Stale references found in active docs"
            echo "Canonical values: SSOT v2.12.0, 275 tests, dosetap_events.sqlite, #if false wrapper"
            echo ""
            echo "Stale refs found:"
            echo "$STALE"
            exit 1
          fi
          echo "✅ No stale references in active docs"

  print-ban:
    name: Production print() Ban
    runs-on: macos-14
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Check for any print() in ios/Core
        run: |
          set -euo pipefail
          echo "🔍 Checking for print() in ios/Core..."
          VIOLATIONS="$(rg -n '\bprint\s*\(' ios/Core --glob '*.swift' || true)"
          if [ -n "$VIOLATIONS" ]; then
            echo "❌ FAIL: print() found in ios/Core (use os.Logger instead):"
            echo ""
            printf "%s\n" "$VIOLATIONS"
            exit 1
          fi
          echo "✅ No print() in ios/Core"

      - name: Check for any print() in ios/DoseTap
        run: |
          set -euo pipefail
          echo "🔍 Checking for print() in ios/DoseTap..."
          VIOLATIONS="$(rg -n '\bprint\s*\(' ios/DoseTap --glob '*.swift' || true)"
          if [ -n "$VIOLATIONS" ]; then
            echo "❌ FAIL: print() found in ios/DoseTap (use os.Logger instead):"
            echo ""
            printf "%s\n" "$VIOLATIONS"
            exit 1
          fi
          echo "✅ No print() in ios/DoseTap"

  xcode-build:
    name: Xcode iOS Build
    runs-on: macos-14
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Select Xcode
        run: |
          set -euo pipefail
          if [ -d /Applications/Xcode_15.4.app/Contents/Developer ]; then
            sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
          else
            echo "Xcode 15.4 not found on runner; using default selected Xcode."
          fi
          xcodebuild -version
      
      - name: Generate CI Secrets stub
        run: |
          if [ ! -f ios/DoseTap/Secrets.swift ]; then
            cp ios/DoseTap/Secrets.template.swift ios/DoseTap/Secrets.swift
            echo "✅ Created Secrets.swift from template for CI build"
          fi

      - name: Build iOS App
        run: |
          cd ios
          xcodebuild build \
            -project DoseTap.xcodeproj \
            -scheme DoseTap \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color || exit 1
      
      - name: Build Summary
        if: always()
        run: |
          echo "### Xcode Build" >> $GITHUB_STEP_SUMMARY
          echo "- Platform: iOS Simulator" >> $GITHUB_STEP_SUMMARY
          echo "- Scheme: DoseTap" >> $GITHUB_STEP_SUMMARY
          echo "- Configuration: Debug" >> $GITHUB_STEP_SUMMARY
